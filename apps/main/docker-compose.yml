# Local PostgreSQL for HairHistory API (optional).
# Usage: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hairhistory
    ports:
      - "5432:5432"
    volumes:
      - hairhistory_pgdata:/var/lib/postgresql/data

volumes:
  hairhistory_pgdata:
